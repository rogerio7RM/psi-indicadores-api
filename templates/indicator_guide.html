<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ guide.title }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <style>
    main { max-width: 920px; margin: 0 auto; padding: 32px 24px 64px; }
    h1 { margin-bottom: 0.5rem; }
    h2 { margin-top: 2rem; }
    .section { margin-bottom: 1.5rem; }
    .section p { margin: 0.4rem 0; }
    .tips { background: rgba(0, 128, 255, .08); border-left: 3px solid var(--accent); padding: 12px 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <main>
    <div class="card" style="margin-bottom: 16px;">
      <label>{{ i18n.language }}</label>
      <div class="lang-select">
        <label class="lang-option">
          <input type="radio" name="lang" value="pt" {% if lang == 'pt' %}checked{% endif %}>
          <span class="lang-flag pt">{{ i18n.language_pt }}</span>
        </label>
        <label class="lang-option">
          <input type="radio" name="lang" value="en" {% if lang == 'en' %}checked{% endif %}>
          <span class="lang-flag en">{{ i18n.language_en }}</span>
        </label>
        <label class="lang-option">
          <input type="radio" name="lang" value="es" {% if lang == 'es' %}checked{% endif %}>
          <span class="lang-flag es">{{ i18n.language_es }}</span>
        </label>
      </div>
    </div>

    <h1>{{ guide.title }}</h1>
    <p>{{ guide.intro }}</p>

    {% for sec in guide.sections %}
    <div class="section">
      <h2>{{ sec.title }}</h2>
      <p><strong>{{ sec.what }}</strong></p>
      <p>{{ sec.why }}</p>
    </div>
    {% endfor %}

    <div class="section tips">
      <strong>{{ guide.tip }}</strong>
    </div>
  </main>
  <script>
    (function () {
      var inputs = document.querySelectorAll('input[name="lang"]');
      if (!inputs.length) { return; }
      function updateLang(value) {
        var url = new URL(window.location.href);
        url.searchParams.set('lang', value);
        window.location.href = url.toString();
      }
      inputs.forEach(function (input) {
        input.addEventListener('change', function () {
          updateLang(input.value);
        });
      });
    })();
  </script>
</body>
</html>
